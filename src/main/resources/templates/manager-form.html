<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Додати менеджера</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f7f7f7;
    }

    .container {
        max-width: 700px;
        background: white;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
    }

    .buttons {
        margin-top: 20px;
    }

    button, a.button {
        display: inline-block;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
        font-size: 14px;
    }

    button {
        background-color: #2d6cdf;
        color: white;
    }

    a.button {
        background-color: #777;
        color: white;
        margin-left: 10px;
    }

    .error {
        color: #c62828;
        font-size: 14px;
        margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Додати нового менеджера</h1>

  <form th:action="@{/managers-page}" th:object="${manager}" method="post">
    <label for="firstName">Ім’я</label>
    <input type="text" id="firstName" th:field="*{firstName}">
    <div class="error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>

    <label for="lastName">Прізвище</label>
    <input type="text" id="lastName" th:field="*{lastName}">
    <div class="error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>

    <label for="email">Email</label>
    <input type="email" id="email" th:field="*{email}">
    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

    <div class="buttons">
      <button type="submit">Зберегти</button>
      <a class="button" th:href="@{/managers-page}">Назад</a>
    </div>
  </form>
</div>
</body>
</html>
